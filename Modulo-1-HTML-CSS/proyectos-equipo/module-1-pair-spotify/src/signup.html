<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regístrate - Spotify</title>
    <link rel="stylesheet" href="./scss/signup.scss" />
  </head>

  <body>
    <main class="signup">
      <header class="signup-header">
        <img
          class="signup-logo"
          src="./images/logo2.png"
          alt="Logo de Spotify"
        />
        <h1 class="signup-title">Regístrate gratis para empezar a escuchar.</h1>
      </header>

      <div class="signup-social">
        <button class="btn-facebook">Registrarte con Facebook</button>
        <button class="btn-google">Registrarte con Google</button>
      </div>

      <div class="divider"><span>o</span></div>

      <form
        action="https://api-pw.api-pw.dev.adalab.es/api/form"
        method="POST"
        class="form"
      >
        <div class="form-group">
          <label for="email" class="form-label"
            >¿Cuál es tu correo electrónico?</label
          >
          <input
            type="email"
            id="email"
            name="user_email"
            placeholder="Introduce tu correo electrónico."
            required
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="confirm" class="form-label"
            >Confirmar correo electrónico</label
          >
          <input
            type="email"
            id="confirm"
            name="confirm_email"
            placeholder="Introduce de nuevo tu correo electrónico."
            required
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="pass" class="form-label">Crea una contraseña</label>
          <input
            type="password"
            id="pass"
            name="user_password"
            placeholder="Crea una contraseña."
            required
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="nickname" class="form-label"
            >¿Cómo quieres que te llamemos?</label
          >

          <input
            type="text"
            id="nickname"
            name="name"
            placeholder="Pon un nombre de perfil."
            required
            class="form-input"
          />
        </div>

        <fieldset class="form-fieldset">
          <legend class="form-label">¿Cuál es tu fecha de nacimiento?</legend>
          <div class="form-birth-grid">
            <input
              type="text"
              name="day"
              placeholder="DD"
              pattern="[0-9]{1,2}"
              required
              class="form-input"
            />
            <select name="month" required class="form-input">
              <option value="" disabled selected>Mes</option>
              <option value="01">Enero</option>
              <option value="02">Febrero</option>
            </select>
            <input
              type="text"
              name="year"
              placeholder="AAAA"
              pattern="[0-9]{4}"
              required
              class="form-input"
            />
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend class="form-label">¿Cuál es tu género?</legend>
          <div class="form-gender-options">
            <label
              ><input type="radio" name="gender" value="male" /> Hombre</label
            >
            <label
              ><input type="radio" name="gender" value="female" /> Mujer</label
            >
            <label
              ><input type="radio" name="gender" value="non-binary" /> No
              binario</label
            >
          </div>
        </fieldset>

        <div class="form-check">
          <input type="checkbox" id="marketing" name="marketing" />
          <label for="marketing"
            >No quiero recibir mensajes de marketing de Spotify</label
          >
        </div>

        <div class="form-check">
          <input type="checkbox" id="privacy" name="privacy" required />
          <label for="privacy"
            >Compartir mis datos de registro con los proveedores de contenido de
            Spotify para fines de marketing.</label
          >
        </div>

        <div class="form-actions">
          <input type="reset" value="Borrar todo" class="btn-reset" />
          <input type="submit" value="Registrarse" class="btn-submit" />
          <p class="signup-login">
            ¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a>.
          </p>
        </div>
      </form>
      <footer class="signup-footer">
        <a href="./index.html" class="btn-secondary"
          >Volver a la página principal</a
        >
      </footer>
    </main>
  </body>
</html>
