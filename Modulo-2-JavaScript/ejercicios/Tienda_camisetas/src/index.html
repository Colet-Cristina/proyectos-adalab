<!doctype html>
<html lang="es">
  <!-- ------------ head ------------------  -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camisetas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Open+Sans&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./scss/main.scss" />
  </head>
  <!-- -------------  -----------------  -->
  <body>
    <!-- ------------ HEADER ------------------  -->
    <header class="header js_header">
      <h1 class="title js_title">Console.log("Camisetas")</h1>
    </header>
    <!-- ------------------------------  -->
    <div>
      <h2>Camisetas</h2>
      <section class="filter">
        <input type="text" class="input js_input" placeholder="Buscar..." />
      </section>
      <section class="list js_list"></section>
    </div>
    <section class="cart">
      <h2>Cesta de la compra</h2>
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Unidades</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody class="js_cartTableBody"></tbody>
      </table>

      <div class="cart-total">
        <p>Total: <span class="js_cartTotal">0€</span></p>
      </div>
    </section>
    <!-- ------------------------------  -->
    <script src="./js/main.js"></script>
  </body>
  <!-- ------------------------------  -->
</html>
